server {
    listen 80;

    # Chat UI + triage API
    location / {
        proxy_pass         http://triage-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ProofLayer Decision Explorer + API (same upstream, explicit for clarity)
    location /admin {
        proxy_pass         http://triage-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/v1/ {
        proxy_pass         http://triage-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }
}
