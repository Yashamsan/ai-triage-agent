[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".venv", "__pycache__", ".agents"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501", "E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "llm: tests that require a live LLM API (skip with -m 'not llm')",
]
addopts = "-v"
